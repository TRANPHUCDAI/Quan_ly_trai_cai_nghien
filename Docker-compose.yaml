version: '3.8'

services:
  # 1. Khởi chạy Container PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: trangvi
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: ql_cai_nghien
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    # Bổ sung cơ chế tự kiểm tra sức khỏe của Postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trangvi -d ql_cai_nghien"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Khởi chạy Container Spring Boot Web App
  web-app:
    build: .
    container_name: springboot_app
    ports:
      - "8081:8080"
    volumes:
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy # <-- Sửa từ service_started thành service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/ql_cai_nghien
      - SPRING_DATASOURCE_USERNAME=trangvi
      - SPRING_DATASOURCE_PASSWORD=123456

  # 3. Khởi chạy Container pgAdmin
  pgadmin:
    image: dpage/pgadmin4:8.4
    container_name: pgadmin_container
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: trangvi@admin.com
      PGADMIN_DEFAULT_PASSWORD: 123456
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data: